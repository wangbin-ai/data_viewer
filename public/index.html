<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --border: #e2e6ea;
    --primary: #4a6cf7;
    --primary-hover: #3a5ce6;
    --text: #2d3748;
    --muted: #718096;
    --user-bg: #ebf4ff;
    --user-border: #bee3f8;
    --assistant-bg: #f0fff4;
    --assistant-border: #9ae6b4;
    --think-bg: #fffbeb;
    --think-border: #fbd38d;
    --code-bg: #f7fafc;
    --radius: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .header h1 { font-size: 16px; font-weight: 700; white-space: nowrap; }
  .path-input {
    flex: 1;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    outline: none;
    transition: border-color .15s;
    min-width: 0;
  }
  .path-input:focus { border-color: var(--primary); }
  .btn {
    padding: 6px 14px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s;
  }
  .btn:hover { background: var(--primary-hover); }
  .btn.secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn.secondary:hover { background: var(--bg); }

  /* ── Breadcrumb ── */
  .breadcrumb {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 2px;
  }
  .breadcrumb span { cursor: pointer; color: var(--primary); }
  .breadcrumb span:hover { text-decoration: underline; }
  .breadcrumb .sep { color: var(--muted); margin: 0 2px; }
  .breadcrumb .current { color: var(--text); font-weight: 600; cursor: default; }

  /* ── Main layout ── */
  .main { padding: 16px 20px; }

  /* ── Directory browser ── */
  .dir-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }
  .dir-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: border-color .15s, box-shadow .15s;
    word-break: break-all;
  }
  .dir-item:hover {
    border-color: var(--primary);
    box-shadow: 0 2px 8px rgba(74,108,247,.12);
  }
  .dir-item .icon { font-size: 18px; flex-shrink: 0; }
  .dir-item .name { font-size: 13px; font-weight: 500; }

  /* ── File selector ── */
  .file-selector {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .file-selector label { font-weight: 600; font-size: 13px; }
  .file-select {
    flex: 1;
    min-width: 200px;
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    outline: none;
  }
  .file-select:focus { border-color: var(--primary); }

  /* ── Masonry waterfall ── */
  .waterfall {
    columns: 1;
    column-gap: 16px;
  }
  @media (min-width: 900px) { .waterfall { columns: 2; } }
  @media (min-width: 1400px) { .waterfall { columns: 3; } }

  /* ── Record card ── */
  .record-card {
    break-inside: avoid;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
    display: inline-block;
    width: 100%;
  }
  .card-header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 6px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
  }
  .card-id { font-family: monospace; }

  /* ── Card body: images left, text right ── */
  .card-body {
    display: flex;
    gap: 0;
    min-height: 0;
  }
  .card-images {
    flex: 0 0 auto;
    width: 200px;
    min-width: 120px;
    max-width: 260px;
    border-right: 1px solid var(--border);
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: #fafafa;
  }
  .card-images:empty { display: none; }
  .card-images img {
    width: 100%;
    height: auto;
    border-radius: 4px;
    border: 1px solid var(--border);
    display: block;
    object-fit: contain;
    loading: lazy;
  }
  .img-label {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 2px;
  }

  .card-text {
    flex: 1;
    min-width: 0;
    padding: 10px 12px;
    overflow: hidden;
  }

  /* ── Meta prompt ── */
  .meta-prompt {
    font-size: 11px;
    color: var(--muted);
    padding: 4px 8px;
    background: var(--code-bg);
    border-radius: 4px;
    margin-bottom: 8px;
    font-style: italic;
  }
  .meta-prompt:empty { display: none; }

  /* ── Message bubbles ── */
  .message { margin-bottom: 8px; }
  .msg-role {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 4px;
  }
  .msg-role.user { color: #2b6cb0; }
  .msg-role.assistant { color: #276749; }

  .msg-body {
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 13px;
  }
  .msg-body.user {
    background: var(--user-bg);
    border: 1px solid var(--user-border);
  }
  .msg-body.assistant {
    background: var(--assistant-bg);
    border: 1px solid var(--assistant-border);
  }

  /* Think block */
  .think-block {
    margin: 4px 0;
    border: 1px solid var(--think-border);
    border-radius: 4px;
    overflow: hidden;
  }
  .think-toggle {
    background: var(--think-bg);
    padding: 4px 8px;
    font-size: 11px;
    color: #b7791f;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .think-toggle:hover { background: #fef3c7; }
  .think-content {
    padding: 8px;
    font-size: 12px;
    color: #744210;
    white-space: pre-wrap;
    word-break: break-word;
    background: #fffdf5;
    display: none;
  }
  .think-content.open { display: block; }

  .msg-text {
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* inline image ref inside message */
  .inline-img-ref {
    display: inline-block;
    background: var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 11px;
    color: var(--muted);
    font-family: monospace;
  }

  /* ── Raw JSON toggle ── */
  .raw-toggle {
    padding: 6px 12px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    font-size: 11px;
    color: var(--primary);
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .raw-toggle:hover { background: #edf2ff; }
  .raw-content {
    display: none;
    padding: 10px 12px;
    background: #1e1e2e;
    color: #cdd6f4;
    font-family: 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    white-space: pre;
    overflow-x: auto;
    border-top: 1px solid #444;
    max-height: 400px;
    overflow-y: auto;
  }
  .raw-content.open { display: block; }

  /* ── Load more ── */
  .load-more-sentinel { height: 60px; display: flex; align-items: center; justify-content: center; }
  .load-more-btn {
    padding: 8px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    color: var(--primary);
    transition: background .15s;
  }
  .load-more-btn:hover { background: var(--bg); }

  /* ── Status / errors ── */
  .status {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .error-msg {
    background: #fff5f5;
    border: 1px solid #fed7d7;
    color: #c53030;
    padding: 10px 14px;
    border-radius: var(--radius);
    margin: 12px 0;
    font-size: 13px;
  }

  /* ── Spinner ── */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1>📊 Data Viewer</h1>
  <input id="pathInput" class="path-input" type="text" placeholder="输入数据目录路径，例如 /root/data/stem" value="/root/data/stem">
  <button class="btn" onclick="navigate(pathInput.value.trim())">打开</button>
</div>

<div id="breadcrumb" class="breadcrumb" style="display:none"></div>

<div class="main" id="main">
  <div class="status">输入目录路径后点击「打开」开始浏览</div>
</div>

<script>
// ── State ──
let state = {
  currentPath: '',
  currentFile: '',
  offset: 0,
  limit: 20,
  loading: false,
  hasMore: false,
  isDataDir: false,
};

const mainEl = document.getElementById('main');
const breadcrumbEl = document.getElementById('breadcrumb');
let observer = null;

// ── Navigation ──
async function navigate(dirPath) {
  if (!dirPath) return;
  try {
    const res = await fetch('/api/browse?path=' + encodeURIComponent(dirPath));
    const data = await res.json();
    if (data.error) return showError(data.error);

    state.currentPath = data.path;
    state.isDataDir = data.isDataDir;
    state.currentFile = '';
    state.offset = 0;

    updateBreadcrumb(data.path);
    renderBrowser(data);
  } catch (e) {
    showError(e.message);
  }
}

function updateBreadcrumb(fullPath) {
  breadcrumbEl.style.display = 'flex';
  const parts = fullPath.replace(/\\/g, '/').split('/').filter(Boolean);
  let html = '<span onclick="navigate(\'/\')">/ (根)</span>';
  let acc = '';
  parts.forEach((p, i) => {
    acc += '/' + p;
    const path = acc;
    html += '<span class="sep">/</span>';
    if (i === parts.length - 1) {
      html += `<span class="current">${esc(p)}</span>`;
    } else {
      html += `<span onclick="navigate('${esc(path)}')">${esc(p)}</span>`;
    }
  });
  breadcrumbEl.innerHTML = html;
}

function renderBrowser(data) {
  disconnectObserver();
  let html = '';

  if (data.isDataDir) {
    html += renderFileSelector(data.path);
  }

  const dirs = data.items.filter(i => i.isDir);
  const files = data.items.filter(i => !i.isDir);

  if (dirs.length) {
    html += '<div class="dir-grid">';
    dirs.forEach(item => {
      html += `<div class="dir-item" onclick="navigate('${esc(item.path)}')">
        <span class="icon">📁</span>
        <span class="name">${esc(item.name)}</span>
      </div>`;
    });
    html += '</div>';
  }

  if (files.length && !data.isDataDir) {
    html += '<div class="dir-grid">';
    files.forEach(item => {
      html += `<div class="dir-item" onclick="openJsonlFile('${esc(item.path)}','${esc(data.path)}')">
        <span class="icon">📄</span>
        <span class="name">${esc(item.name)}</span>
      </div>`;
    });
    html += '</div>';
  }

  if (!dirs.length && !data.isDataDir) {
    html += '<div class="status">此目录为空或不含可浏览内容</div>';
  }

  if (data.isDataDir) {
    html += '<div id="waterfall" class="waterfall"></div>';
    html += '<div class="load-more-sentinel" id="sentinel"></div>';
  }

  mainEl.innerHTML = html;

  if (data.isDataDir) {
    loadJsonlFiles(data.path);
  }
}

// ── File selector ──
function renderFileSelector(dirPath) {
  return `<div class="file-selector">
    <label>JSONL 文件：</label>
    <select class="file-select" id="fileSelect" onchange="onFileChange(this.value)">
      <option value="">-- 加载中 --</option>
    </select>
    <span id="recordCount" style="font-size:12px;color:#718096"></span>
  </div>`;
}

async function loadJsonlFiles(dirPath) {
  try {
    const res = await fetch('/api/jsonl-files?path=' + encodeURIComponent(dirPath));
    const data = await res.json();
    if (data.error) return showError(data.error);

    const sel = document.getElementById('fileSelect');
    if (!sel) return;
    if (!data.files.length) {
      sel.innerHTML = '<option value="">无 .jsonl 文件</option>';
      return;
    }
    sel.innerHTML = data.files.map(f =>
      `<option value="${esc(f.path)}">${esc(f.name)}</option>`
    ).join('');

    openJsonlFile(data.files[0].path, dirPath);
  } catch (e) {
    showError(e.message);
  }
}

function onFileChange(filePath) {
  if (!filePath) return;
  openJsonlFile(filePath, state.currentPath);
}

function openJsonlFile(filePath, dirPath) {
  state.currentFile = filePath;
  state.offset = 0;
  state.hasMore = false;

  const wf = document.getElementById('waterfall');
  if (wf) wf.innerHTML = '';

  const sel = document.getElementById('fileSelect');
  if (sel && filePath) sel.value = filePath;

  setupSentinelObserver();
  loadMoreRecords();
}

// ── Load records ──
async function loadMoreRecords() {
  if (state.loading || !state.currentFile) return;
  if (state.offset > 0 && !state.hasMore) return;

  state.loading = true;
  showSentinelSpinner();

  try {
    const url = `/api/records?file=${encodeURIComponent(state.currentFile)}&offset=${state.offset}&limit=${state.limit}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) { showError(data.error); return; }

    appendRecords(data.records, state.currentPath);
    state.offset += data.records.length;
    state.hasMore = data.hasMore;

    const countEl = document.getElementById('recordCount');
    if (countEl) countEl.textContent = `已加载 ${state.offset} 条${data.hasMore ? '' : '（全部）'}`;
  } catch (e) {
    showError(e.message);
  } finally {
    state.loading = false;
    hideSentinelSpinner();
  }
}

function appendRecords(records, dirPath) {
  const wf = document.getElementById('waterfall');
  if (!wf) return;

  records.forEach(({ lineNum, raw }) => {
    let parsed = null;
    try { parsed = JSON.parse(raw); } catch (e) { /* ignore */ }
    const card = buildCard(lineNum, raw, parsed, dirPath);
    wf.appendChild(card);
  });
}

// ── Card builder ──
function buildCard(lineNum, raw, parsed, dirPath) {
  const div = document.createElement('div');
  div.className = 'record-card';

  const id = parsed?.id || `#${lineNum}`;
  const imagesDir = dirPath ? dirPath + '/images' : '';

  // Collect all images and build formatted text
  let imagesHtml = '';
  let textHtml = '';

  if (parsed) {
    // Meta prompt
    const meta = (parsed.meta_prompt || []).filter(s => s && s.trim());
    if (meta.length) {
      textHtml += `<div class="meta-prompt">📌 ${esc(meta.join(' | '))}</div>`;
    }

    // Messages
    (parsed.data || []).forEach(msg => {
      const role = msg.role || 'unknown';
      const contentItems = Array.isArray(msg.content) ? msg.content : [];

      // Collect images for left panel
      contentItems.forEach(item => {
        if (item.type === 'image') {
          const relPath = item.image?.relative_path;
          if (relPath && imagesDir) {
            const fullPath = imagesDir + '/' + relPath;
            imagesHtml += `<img src="/api/image?path=${encodeURIComponent(fullPath)}" loading="lazy" alt="${esc(relPath)}" title="${esc(relPath)}">`;
          }
        }
      });

      // Build text for right panel
      textHtml += buildMessageHtml(role, contentItems);
    });
  } else {
    textHtml = `<div class="error-msg">JSON 解析失败</div>`;
  }

  div.innerHTML = `
    <div class="card-header">
      <span class="card-id">${esc(id)}</span>
      <span>#${lineNum}</span>
    </div>
    <div class="card-body">
      <div class="card-images">${imagesHtml}</div>
      <div class="card-text">${textHtml}</div>
    </div>
    <div class="raw-toggle" onclick="toggleRaw(this)">
      <span class="toggle-arrow">▶</span> 原始 JSONL
    </div>
    <div class="raw-content">${esc(tryPrettyJson(raw))}</div>
  `;
  return div;
}

function buildMessageHtml(role, contentItems) {
  const roleLabel = role === 'user' ? '用户' : role === 'assistant' ? '助手' : role;
  let bodyHtml = '';

  contentItems.forEach(item => {
    if (item.type === 'text') {
      const str = item.text?.string || item.text || '';
      if (role === 'assistant') {
        bodyHtml += renderAssistantText(str);
      } else {
        bodyHtml += `<span class="msg-text">${esc(str)}</span>`;
      }
    } else if (item.type === 'image') {
      const relPath = item.image?.relative_path || '';
      bodyHtml += `<span class="inline-img-ref">🖼 ${esc(relPath)}</span>`;
    }
  });

  return `<div class="message">
    <div class="msg-role ${role}">${esc(roleLabel)}</div>
    <div class="msg-body ${role}">${bodyHtml}</div>
  </div>`;
}

function renderAssistantText(text) {
  // Extract <think>...</think> blocks
  const thinkRe = /<think>([\s\S]*?)<\/think>/g;
  let result = '';
  let lastIdx = 0;
  let m;

  while ((m = thinkRe.exec(text)) !== null) {
    const before = text.slice(lastIdx, m.index);
    if (before) result += `<span class="msg-text">${esc(before)}</span>`;

    const thinkId = 'think_' + Math.random().toString(36).slice(2);
    result += `<div class="think-block">
      <div class="think-toggle" onclick="toggleThink('${thinkId}')">
        <span>💭</span> 思考过程 <span id="${thinkId}_arrow">▶</span>
      </div>
      <div class="think-content" id="${thinkId}">${esc(m[1])}</div>
    </div>`;
    lastIdx = m.index + m[0].length;
  }

  const rest = text.slice(lastIdx);
  if (rest) result += `<span class="msg-text">${esc(rest)}</span>`;
  return result;
}

// ── Toggle helpers ──
function toggleRaw(el) {
  const content = el.nextElementSibling;
  const arrow = el.querySelector('.toggle-arrow');
  const open = content.classList.toggle('open');
  arrow.textContent = open ? '▼' : '▶';
}

function toggleThink(id) {
  const el = document.getElementById(id);
  const arrow = document.getElementById(id + '_arrow');
  if (!el) return;
  const open = el.classList.toggle('open');
  if (arrow) arrow.textContent = open ? '▼' : '▶';
}

// ── IntersectionObserver for infinite scroll ──
function setupSentinelObserver() {
  disconnectObserver();
  const sentinel = document.getElementById('sentinel');
  if (!sentinel) return;
  observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) loadMoreRecords();
  }, { rootMargin: '200px' });
  observer.observe(sentinel);
}

function disconnectObserver() {
  if (observer) { observer.disconnect(); observer = null; }
}

function showSentinelSpinner() {
  const s = document.getElementById('sentinel');
  if (s) s.innerHTML = '<div class="spinner"></div>';
}

function hideSentinelSpinner() {
  const s = document.getElementById('sentinel');
  if (!s) return;
  if (!state.hasMore) {
    s.innerHTML = state.offset > 0 ? '<span style="color:#718096;font-size:12px">— 已加载全部 —</span>' : '';
  } else {
    s.innerHTML = '';
  }
}

// ── Utilities ──
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function tryPrettyJson(raw) {
  try { return JSON.stringify(JSON.parse(raw), null, 2); } catch { return raw; }
}

function showError(msg) {
  mainEl.innerHTML = `<div class="error-msg">❌ ${esc(msg)}</div>`;
}

// ── Enter key on path input ──
document.getElementById('pathInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') navigate(e.target.value.trim());
});
</script>
</body>
</html>

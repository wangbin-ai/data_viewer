<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Viewer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:             #080c14;
  --bg2:            #0c1220;
  --surface:        #111827;
  --surface2:       #1a2235;
  --border:         rgba(99,102,241,.18);
  --border-bright:  rgba(99,102,241,.5);
  --primary:        #6366f1;
  --primary2:       #818cf8;
  --cyan:           #22d3ee;
  --green:          #34d399;
  --amber:          #fbbf24;
  --red:            #f87171;
  --text:           #e2e8f0;
  --text2:          #94a3b8;
  --text3:          #4b5680;
  --user-bg:        rgba(59,130,246,.08);
  --user-border:    rgba(59,130,246,.25);
  --asst-bg:        rgba(52,211,153,.06);
  --asst-border:    rgba(52,211,153,.2);
  --think-bg:       rgba(251,191,36,.06);
  --think-border:   rgba(251,191,36,.25);
  --glow:           0 0 24px rgba(99,102,241,.18);
  --radius:         12px;
  --radius-sm:      7px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.65;
  min-height: 100vh;
}

/* ── Animated bg grid ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(99,102,241,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,102,241,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── Header ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,12,20,.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--primary), var(--cyan), transparent);
  opacity: .4;
}
.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.logo-icon {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, var(--primary), var(--cyan));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
}
.logo-text {
  font-size: 15px;
  font-weight: 700;
  background: linear-gradient(90deg, var(--primary2), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  white-space: nowrap;
}
.path-input {
  flex: 1;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
  padding: 7px 12px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  min-width: 0;
}
.path-input::placeholder { color: var(--text3); }
.path-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(99,102,241,.15);
}
.btn {
  padding: 7px 18px;
  background: linear-gradient(135deg, var(--primary), #4f46e5);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity .15s, transform .1s;
  box-shadow: 0 2px 12px rgba(99,102,241,.35);
}
.btn:hover { opacity: .88; }
.btn:active { transform: scale(.97); }

/* ── Breadcrumb ── */
.breadcrumb {
  position: relative;
  z-index: 1;
  background: rgba(12,18,32,.7);
  border-bottom: 1px solid var(--border);
  padding: 8px 24px;
  font-size: 12px;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 2px;
  color: var(--text3);
}
.breadcrumb a {
  color: var(--primary2);
  cursor: pointer;
  text-decoration: none;
  transition: color .15s;
}
.breadcrumb a:hover { color: var(--cyan); }
.breadcrumb .sep { color: var(--text3); margin: 0 3px; }
.breadcrumb .cur { color: var(--text); font-weight: 600; }

/* ── Main ── */
.main {
  position: relative;
  z-index: 1;
  padding: 20px 24px 60px;
}

/* ── Dir grid ── */
.dir-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}
.dir-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 9px;
  transition: border-color .2s, box-shadow .2s, background .2s;
  word-break: break-all;
}
.dir-item:hover {
  border-color: var(--border-bright);
  background: var(--surface2);
  box-shadow: var(--glow);
}
.dir-item .icon { font-size: 20px; flex-shrink: 0; }
.dir-item .name { font-size: 12px; font-weight: 500; color: var(--text2); }

/* ── File selector ── */
.file-selector {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.file-selector label { font-size: 12px; font-weight: 600; color: var(--text2); white-space: nowrap; }
.file-select {
  flex: 1;
  min-width: 180px;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
  padding: 5px 9px;
  outline: none;
}
.file-select:focus { border-color: var(--primary); }
.record-count {
  font-size: 11px;
  color: var(--text3);
  background: rgba(99,102,241,.1);
  padding: 3px 9px;
  border-radius: 99px;
  border: 1px solid rgba(99,102,241,.2);
}

/* ── Single-column feed ── */
.feed { display: flex; flex-direction: column; gap: 16px; }

/* ── Record card ── */
.record-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
  animation: fadeUp .3s ease both;
}
.record-card:hover {
  border-color: var(--border-bright);
  box-shadow: var(--glow);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  background: linear-gradient(90deg, rgba(99,102,241,.08), transparent);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
}
.card-id {
  font-family: 'SF Mono', 'Fira Code', monospace;
  color: var(--primary2);
  font-size: 11px;
}
.card-idx {
  color: var(--text3);
  font-size: 11px;
  background: rgba(255,255,255,.04);
  padding: 1px 7px;
  border-radius: 99px;
  border: 1px solid var(--border);
}

/* ── Card body layout ── */
.card-body { display: flex; }

/* ── Image panel ── */
.card-images {
  flex: 0 0 220px;
  border-right: 1px solid var(--border);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: rgba(0,0,0,.2);
}
.card-images:empty { display: none; }
.card-img-wrap {
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1px solid rgba(255,255,255,.06);
  background: rgba(0,0,0,.3);
}
.card-images img {
  width: 100%;
  height: auto;
  display: block;
  object-fit: contain;
  cursor: zoom-in;
  transition: opacity .15s;
}
.card-images img:hover { opacity: .85; }

/* ── Lightbox ── */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 999;
  background: rgba(0,0,0,.88);
  backdrop-filter: blur(8px);
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 92vw;
  max-height: 92vh;
  object-fit: contain;
  border-radius: var(--radius);
  box-shadow: 0 0 60px rgba(0,0,0,.8);
  cursor: default;
  animation: lbIn .2s ease;
}
@keyframes lbIn {
  from { opacity: 0; transform: scale(.92); }
  to   { opacity: 1; transform: scale(1); }
}
.lightbox-close {
  position: absolute;
  top: 18px; right: 22px;
  color: rgba(255,255,255,.6);
  font-size: 28px;
  cursor: pointer;
  line-height: 1;
  transition: color .15s;
}
.lightbox-close:hover { color: #fff; }

/* ── Text panel ── */
.card-text {
  flex: 1;
  min-width: 0;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── Meta prompt ── */
.meta-prompt {
  font-size: 11px;
  color: var(--text3);
  background: rgba(255,255,255,.03);
  border: 1px solid var(--border);
  border-left: 2px solid var(--primary);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 5px 10px;
  font-style: italic;
}

/* ── Message ── */
.message { display: flex; flex-direction: column; gap: 5px; }
.msg-role {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  display: flex;
  align-items: center;
  gap: 5px;
}
.msg-role.user { color: #60a5fa; }
.msg-role.user::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #60a5fa; box-shadow: 0 0 6px #60a5fa; }
.msg-role.assistant { color: var(--green); }
.msg-role.assistant::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }

.msg-body {
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.7;
}
.msg-body.user {
  background: var(--user-bg);
  border: 1px solid var(--user-border);
}
.msg-body.assistant {
  background: var(--asst-bg);
  border: 1px solid var(--asst-border);
}

.msg-text {
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--text);
}

/* ── Think block ── */
.think-block {
  border: 1px solid var(--think-border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin: 4px 0;
}
.think-toggle {
  background: var(--think-bg);
  padding: 5px 10px;
  font-size: 11px;
  color: var(--amber);
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: background .15s;
}
.think-toggle:hover { background: rgba(251,191,36,.1); }
.think-arrow { transition: transform .2s; }
.think-content {
  padding: 10px 12px;
  font-size: 12px;
  color: #d4a843;
  white-space: pre-wrap;
  word-break: break-word;
  background: rgba(0,0,0,.15);
  display: none;
  border-top: 1px solid var(--think-border);
}
.think-content.open { display: block; }
.think-toggle.open .think-arrow { transform: rotate(90deg); }

/* Inline image reference tag */
.inline-img-ref {
  display: inline-block;
  background: rgba(99,102,241,.12);
  border: 1px solid rgba(99,102,241,.2);
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 11px;
  color: var(--primary2);
  font-family: monospace;
  vertical-align: middle;
}

/* ── Raw JSON ── */
.raw-toggle {
  padding: 7px 14px;
  border-top: 1px solid var(--border);
  background: rgba(0,0,0,.15);
  font-size: 11px;
  color: var(--text3);
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color .15s, background .15s;
}
.raw-toggle:hover { color: var(--primary2); background: rgba(99,102,241,.06); }
.raw-arrow { transition: transform .2s; }
.raw-content {
  display: none;
  padding: 12px 14px;
  background: #070b14;
  color: #a5b4fc;
  font-family: 'Fira Code', 'Cascadia Code', 'SF Mono', monospace;
  font-size: 11px;
  white-space: pre;
  overflow-x: auto;
  border-top: 1px solid rgba(99,102,241,.15);
  max-height: 420px;
  overflow-y: auto;
}
.raw-content.open { display: block; }
.raw-toggle.open .raw-arrow { transform: rotate(90deg); }

/* ── Sentinel / load more ── */
.sentinel {
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text3);
  font-size: 12px;
  gap: 8px;
}

/* ── Spinner ── */
.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(99,102,241,.2);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Status / error ── */
.status {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
  font-size: 14px;
}
.status .hint {
  margin-top: 8px;
  font-size: 12px;
  color: var(--text3);
  opacity: .6;
}
.error-msg {
  background: rgba(248,113,113,.08);
  border: 1px solid rgba(248,113,113,.25);
  color: var(--red);
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  margin: 10px 0;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(99,102,241,.25); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,.45); }

/* ── Back to top ── */
.back-top {
  position: fixed;
  right: 28px;
  bottom: 36px;
  z-index: 200;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), #4f46e5);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(99,102,241,.45);
  opacity: 0;
  transform: translateY(16px) scale(.85);
  transition: opacity .3s, transform .3s;
  pointer-events: none;
}
.back-top.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}
.back-top:hover {
  box-shadow: 0 4px 28px rgba(99,102,241,.7);
  transform: translateY(-2px) scale(1.07);
}
.back-top:active { transform: scale(.95); }
.back-top svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

/* progress ring */
.back-top-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: conic-gradient(rgba(255,255,255,.35) var(--pct, 0%), transparent var(--pct, 0%));
  border-radius: 50%;
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">🔭</div>
    <span class="logo-text">Data Viewer</span>
  </div>
  <input id="pathInput" class="path-input" type="text"
    placeholder="/root/data/stem"
    value="/root/data/stem">
  <button class="btn" onclick="navigate(pathInput.value.trim())">打开</button>
</header>

<div id="breadcrumb" class="breadcrumb" style="display:none"></div>

<button class="back-top" id="backTop" title="回到顶部" onclick="scrollToTop()">
  <div class="back-top-ring" id="backTopRing"></div>
  <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close" onclick="closeLightbox()">✕</span>
  <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
</div>

<div class="main" id="main">
  <div class="status">
    输入目录路径，点击「打开」开始浏览
    <div class="hint">支持含 jsonl/ 子目录的数据集</div>
  </div>
</div>

<script>
// ── State ──
const state = {
  currentPath: '',
  currentFile: '',
  jsonlBase: '',
  imagesDir: '',
  hasImagesDir: false,
  offset: 0,
  limit: 5,
  loading: false,
  hasMore: false,
};

const mainEl = document.getElementById('main');
const breadcrumbEl = document.getElementById('breadcrumb');
let scrollObserver = null;

// ── Navigate ──
async function navigate(dirPath) {
  if (!dirPath) return;
  try {
    const res = await fetch('/api/browse?path=' + enc(dirPath));
    const data = await res.json();
    if (data.error) return showError(data.error);
    state.currentPath = data.path;
    state.hasImagesDir = !!data.hasImagesDir;
    state.imagesDir = data.hasImagesDir ? data.path + '/images' : '';
    state.currentFile = '';
    state.offset = 0;
    updateBreadcrumb(data.path);
    renderBrowser(data);
  } catch (e) { showError(e.message); }
}

function updateBreadcrumb(fullPath) {
  breadcrumbEl.style.display = 'flex';
  const parts = fullPath.replace(/\\/g, '/').split('/').filter(Boolean);
  let acc = '';
  let html = `<a onclick="navigate('/')">~</a>`;
  parts.forEach((p, i) => {
    acc += '/' + p;
    const pCopy = acc;
    html += `<span class="sep">/</span>`;
    if (i === parts.length - 1)
      html += `<span class="cur">${esc(p)}</span>`;
    else
      html += `<a onclick="navigate('${esc(pCopy)}')">${esc(p)}</a>`;
  });
  breadcrumbEl.innerHTML = html;
}

function renderBrowser(data) {
  disconnectObserver();
  let html = '';

  if (data.isDataDir) html += buildFileSelector();

  const dirs = data.items.filter(i => i.isDir);
  if (dirs.length) {
    html += '<div class="dir-grid">';
    dirs.forEach(item => {
      html += `<div class="dir-item" onclick="navigate('${esc(item.path)}')">
        <span class="icon">📁</span>
        <span class="name">${esc(item.name)}</span>
      </div>`;
    });
    html += '</div>';
  }

  if (!dirs.length && !data.isDataDir)
    html += '<div class="status">此目录为空或不含可浏览内容</div>';

  if (data.isDataDir) {
    html += '<div id="feed" class="feed"></div>';
    html += '<div id="sentinel" class="sentinel"></div>';
  }

  mainEl.innerHTML = html;
  if (data.isDataDir) loadJsonlFiles(data.path);
}

// ── File selector ──
function buildFileSelector() {
  return `<div class="file-selector">
    <label>JSONL 文件</label>
    <select class="file-select" id="fileSelect" onchange="onFileChange(this.value)">
      <option value="">-- 加载中 --</option>
    </select>
    <span class="record-count" id="recordCount">-</span>
  </div>`;
}

async function loadJsonlFiles(dirPath) {
  try {
    const res = await fetch('/api/jsonl-files?path=' + enc(dirPath));
    const data = await res.json();
    if (data.error) return showError(data.error);
    const sel = document.getElementById('fileSelect');
    if (!sel) return;
    if (!data.files.length) { sel.innerHTML = '<option>无 .jsonl 文件</option>'; return; }
    sel.innerHTML = data.files.map(f =>
      `<option value="${esc(f.path)}">${esc(f.name)}</option>`
    ).join('');
    openFile(data.files[0].path);
  } catch (e) { showError(e.message); }
}

function onFileChange(fp) { if (fp) openFile(fp); }

function openFile(fp) {
  state.currentFile = fp;
  // Extract stem (e.g. "0000001" from "/path/to/0000001.jsonl") for tarinfo lookup
  state.jsonlBase = (fp.split('/').pop() || '').replace(/\.jsonl$/i, '');
  state.offset = 0;
  state.hasMore = false;
  const sel = document.getElementById('fileSelect');
  if (sel && fp) sel.value = fp;
  const feed = document.getElementById('feed');
  if (feed) feed.innerHTML = '';
  setupObserver();
  loadMore();
}

// ── Load records ──
async function loadMore() {
  if (state.loading || !state.currentFile) return;
  if (state.offset > 0 && !state.hasMore) return;
  state.loading = true;
  setSentinel('spinner');
  try {
    const url = `/api/records?file=${enc(state.currentFile)}&offset=${state.offset}&limit=${state.limit}`;
    const data = await (await fetch(url)).json();
    if (data.error) { showError(data.error); return; }
    appendCards(data.records);
    state.offset += data.records.length;
    state.hasMore = data.hasMore;
    const c = document.getElementById('recordCount');
    if (c) c.textContent = `已加载 ${state.offset} 条${data.hasMore ? '' : ' · 全部'}`;
  } catch (e) { showError(e.message); }
  finally {
    state.loading = false;
    setSentinel(state.hasMore ? '' : 'done');
  }
}

// Max rendered cards in the DOM at once. Older cards are replaced
// with a height-preserving spacer so scroll position stays stable.
const MAX_DOM_CARDS = 30;

function appendCards(records) {
  const feed = document.getElementById('feed');
  if (!feed) return;
  let i = 0;
  function renderNext() {
    if (i >= records.length) return;
    const { lineNum, raw } = records[i++];
    let parsed = null;
    try { parsed = JSON.parse(raw); } catch {}
    feed.appendChild(buildCard(lineNum, raw, parsed));
    pruneCards(feed);
    requestAnimationFrame(renderNext);
  }
  requestAnimationFrame(renderNext);
}

function pruneCards(feed) {
  const cards = feed.querySelectorAll('.record-card');
  if (cards.length <= MAX_DOM_CARDS) return;

  const excess = cards.length - MAX_DOM_CARDS;

  // Measure total visual height of cards to remove (includes gaps via getBoundingClientRect)
  const first = cards[0];
  const last  = cards[excess - 1];
  const removedHeight =
    last.getBoundingClientRect().bottom - first.getBoundingClientRect().top;

  for (let j = 0; j < excess; j++) cards[j].remove();

  // Grow (or create) the top spacer to replace removed height
  let spacer = feed.querySelector('.feed-spacer');
  if (!spacer) {
    spacer = document.createElement('div');
    spacer.className = 'feed-spacer';
    feed.prepend(spacer);
  }
  spacer.style.height = (parseFloat(spacer.style.height) || 0) + removedHeight + 'px';
}

// ── Card builder ──
function buildCard(lineNum, raw, parsed) {
  const el = document.createElement('div');
  el.className = 'record-card';

  const id = parsed?.id || `record-${lineNum}`;
  let imagesHtml = '';
  let textHtml = '';

  if (parsed) {
    const meta = (parsed.meta_prompt || []).filter(s => s?.trim());
    if (meta.length) textHtml += `<div class="meta-prompt">📌 ${esc(meta.join(' · '))}</div>`;

    // Support: {data:[...]}, {messages:[...]}, root array
    const msgs = Array.isArray(parsed.data) ? parsed.data
      : Array.isArray(parsed.messages) ? parsed.messages
      : Array.isArray(parsed) ? parsed : [];

    msgs.forEach(msg => {
      const role = msg.role || 'unknown';
      // content can be an array of typed items OR a plain string
      const items = Array.isArray(msg.content) ? msg.content
        : (typeof msg.content === 'string' ? [{ type: 'text', text: { string: msg.content } }] : []);

      items.forEach(item => {
        if (item.type === 'image' && state.imagesDir) {
          const rel = item.image?.relative_path;
          if (rel) {
            const src = `/api/image?base=${enc(state.imagesDir)}&rel=${enc(rel)}&jsonlBase=${enc(state.jsonlBase)}`;
            imagesHtml += `<div class="card-img-wrap">
              <img src="${src}" loading="lazy" decoding="async" alt="${esc(rel)}" title="${esc(rel)}" onclick="openLightbox(this)">
            </div>`;
          }
        }
      });

      textHtml += buildMsgHtml(role, items);
    });
  } else {
    textHtml = `<div class="error-msg">⚠ JSON 解析失败</div>`;
  }

  el.innerHTML = `
    <div class="card-header">
      <span class="card-id">${esc(id)}</span>
      <span class="card-idx">#${lineNum}</span>
    </div>
    <div class="card-body">
      <div class="card-images">${imagesHtml}</div>
      <div class="card-text">${textHtml}</div>
    </div>
    <div class="raw-toggle" onclick="toggleRaw(this)">
      <span class="raw-arrow">▶</span> 原始 JSONL
    </div>
    <div class="raw-content">${esc(prettyJson(raw))}</div>
  `;
  return el;
}

function buildMsgHtml(role, items) {
  const label = role === 'user' ? '用户' : role === 'assistant' ? '助手' : role;
  let body = '';
  items.forEach(item => {
    if (item.type === 'text') {
      const s = item.text?.string ?? item.text ?? '';
      body += role === 'assistant' ? renderAssistant(s) : `<span class="msg-text">${esc(s)}</span>`;
    } else if (item.type === 'image') {
      body += `<span class="inline-img-ref">🖼 ${esc(item.image?.relative_path || '')}</span> `;
    }
  });
  return `<div class="message">
    <div class="msg-role ${role}">${esc(label)}</div>
    <div class="msg-body ${role}">${body}</div>
  </div>`;
}

function renderAssistant(text) {
  const re = /<think>([\s\S]*?)<\/think>/g;
  let out = '', last = 0, m;
  while ((m = re.exec(text)) !== null) {
    const before = text.slice(last, m.index);
    if (before) out += `<span class="msg-text">${esc(before)}</span>`;
    const id = 'tk_' + Math.random().toString(36).slice(2);
    out += `<div class="think-block">
      <div class="think-toggle" id="${id}_btn" onclick="toggleThink('${id}')">
        <span class="think-arrow">▶</span>💭 思考过程
      </div>
      <div class="think-content" id="${id}">${esc(m[1])}</div>
    </div>`;
    last = m.index + m[0].length;
  }
  const rest = text.slice(last);
  if (rest) out += `<span class="msg-text">${esc(rest)}</span>`;
  return out;
}

// ── Toggles ──
function toggleRaw(btn) {
  const content = btn.nextElementSibling;
  const open = content.classList.toggle('open');
  btn.classList.toggle('open', open);
}
function toggleThink(id) {
  const el = document.getElementById(id);
  const btn = document.getElementById(id + '_btn');
  if (!el) return;
  const open = el.classList.toggle('open');
  btn?.classList.toggle('open', open);
}

// ── Infinite scroll ──
function setupObserver() {
  disconnectObserver();
  const sentinel = document.getElementById('sentinel');
  if (!sentinel) return;
  scrollObserver = new IntersectionObserver(
    entries => { if (entries[0].isIntersecting) loadMore(); },
    { rootMargin: '300px' }
  );
  scrollObserver.observe(sentinel);
}
function disconnectObserver() {
  if (scrollObserver) { scrollObserver.disconnect(); scrollObserver = null; }
}
function setSentinel(mode) {
  const s = document.getElementById('sentinel');
  if (!s) return;
  if (mode === 'spinner') s.innerHTML = '<div class="spinner"></div>';
  else if (mode === 'done') s.innerHTML = '<span>— 已加载全部数据 —</span>';
  else s.innerHTML = '';
}

// ── Utilities ──
const enc = s => encodeURIComponent(s);
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function prettyJson(raw) {
  try { return JSON.stringify(JSON.parse(raw), null, 2); } catch { return raw; }
}
function showError(msg) {
  mainEl.innerHTML = `<div class="error-msg">❌ ${esc(msg)}</div>`;
}

// ── Lightbox ──
function openLightbox(img) {
  document.getElementById('lightboxImg').src = img.src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

// ── Back to top ──
const backTopBtn = document.getElementById('backTop');
const backTopRing = document.getElementById('backTopRing');

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.addEventListener('scroll', () => {
  const scrolled = window.scrollY;
  const total = document.documentElement.scrollHeight - window.innerHeight;
  const pct = total > 0 ? Math.round((scrolled / total) * 100) : 0;

  backTopBtn.classList.toggle('visible', scrolled > 300);
  backTopRing.style.setProperty('--pct', pct + '%');
}, { passive: true });

// Enter key
document.getElementById('pathInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') navigate(e.target.value.trim());
});
</script>
